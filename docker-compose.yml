services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marathon
      POSTGRES_PASSWORD: marathon
      POSTGRES_DB: marathon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marathon"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
